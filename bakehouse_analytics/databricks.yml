# This is a Databricks asset bundle definition for bakehouse_analutics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse_analutics
  uuid: e46d611b-e9ce-4af3-a01a-34a890353f81

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-0543041c-06dd.cloud.databricks.com
    variables:
      catalog: bakehouse_analystics_dev
      schema: rnd
  prod:
    mode: production
    workspace:
      host: https://dbc-0543041c-06dd.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/veerababu.cloud01@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/veerababu.cloud01@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analystics_dev
      schema: rnd
    permissions:
      - user_name: veerababu.cloud01@gmail.com
        level: CAN_MANAGE
